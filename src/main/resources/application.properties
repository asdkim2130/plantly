spring.application.name=plantly

spring.profiles.active=local

# ===== Flyway =====
# 기본 비활성(opt-in). Postgres 환경(local/운영)에서만 명시적으로 켠다.
# H2 테스트나 신규 프로파일이 실수로 PG 전용 마이그레이션(pg_trgm 등)을 타는 것을 구조적으로 차단.
spring.flyway.enabled=false

spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.use_sql_comment=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ===== Pageable =====
# 클라이언트가 ?size=100000 같은 과도한 페이지 크기를 요청해도 이 값으로 제한.
spring.data.web.pageable.max-page-size=100
# 요청 page 파라미터를 1-based로 받는다. (?page=1 → 첫 페이지)
# 내부 Pageable.getPageNumber()는 여전히 0-based이므로 PageResponse 의 (+1) 변환과 일관됨.
spring.data.web.pageable.one-indexed-parameters=true

# ===== Session (JSESSIONID) =====
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
# 동일 사이트(예: localhost:3000 -> localhost:8080)에서는 lax로 충분.
# 프로덕션에서 FE/BE 도메인이 완전히 다르면 same-site=none + cookie.secure=true 로 변경 필요.
server.servlet.session.cookie.same-site=lax

# ===== Remember-Me =====
# 30일 영속 로그인 토큰 서명 키. 프로덕션에서는 환경변수/시크릿으로 반드시 외부화할 것.
app.remember-me.key=${REMEMBER_ME_KEY:plantly-remember-me-dev-key-change-me}

# ===== CORS (FE/BE origin이 다를 때) =====
# 쉼표로 여러 origin 지정 가능. allowCredentials=true 이므로 와일드카드(*)는 사용 불가.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# src/test/resources/application-test.properties

# H2 datasource 를 명시한다. (예전엔 datasource 미지정으로 "우연히" 임베디드 H2 가 떴고
# CI 가 -D 로 Postgres 를 주입했다 — 이제 test=H2 를 선언으로 고정한다.
# pg_trgm/GIN 이 필요한 검색 테스트는 별도 Testcontainers PG 베이스에서 @DynamicPropertySource 로 격리.)
spring.datasource.url=jdbc:h2:mem:plantly;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
# base 에서 이미 opt-in(off)이지만, "test=Flyway 없음"을 테스트 설정에서도 명시적으로 못박는다.
spring.flyway.enabled=false
# 참조데이터 seed 는 테스트에서 실행하지 않는다 (테스트는 각자 픽스처로 데이터 구성).
spring.sql.init.mode=never